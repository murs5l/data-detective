name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and dev dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest -v tests

  backend-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package and API dependencies
        run: |
          pip install -e ".[api]"
          pip install -r backend/requirements-dev.txt

      - name: Run backend API tests
        run: pytest -v backend/tests

  fastscan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Vet and test fastscan
        working-directory: tools/fastscan
        run: |
          go vet ./...
          go test ./... -v

      - name: Build fastscan
        working-directory: tools/fastscan
        run: go build -o /tmp/fastscan .
