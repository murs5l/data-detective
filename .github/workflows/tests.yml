name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install package and dev dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest -v tests

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        run: ruff check src backend tests

  backend-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install package and API dependencies
        run: |
          pip install -e ".[api]"
          pip install -r backend/requirements-dev.txt

      - name: Run backend API tests
        run: pytest -v backend/tests

  fastscan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: false

      - name: Vet and test fastscan
        working-directory: tools/fastscan
        run: |
          go vet ./...
          gofmt -l . | (! grep .)
          go test ./... -v

      - name: Build fastscan
        working-directory: tools/fastscan
        run: go build -o /tmp/fastscan .

  docker:
    runs-on: ubuntu-latest
    needs: [test, backend-tests, fastscan]

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t data-detective:ci .

      - name: Smoke test container
        run: |
          docker run -d --name dd-smoke -p 8000:8000 data-detective:ci
          for i in $(seq 1 20); do
            if curl -sf http://localhost:8000/api/health; then break; fi
            sleep 1
          done
          curl -sf http://localhost:8000/api/health
          docker logs dd-smoke
          docker stop dd-smoke
