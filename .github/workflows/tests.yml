name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install package and dev dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest -v tests

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        run: ruff check src backend tests

  typecheck:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install package and dev/API dependencies
        run: |
          pip install -e ".[dev,api]"

      - name: Type check
        run: mypy src/data_detective backend/app

  backend-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install package and API dependencies
        run: |
          pip install -e ".[api]"
          pip install -r backend/requirements-dev.txt

      - name: Run backend API tests
        run: pytest -v backend/tests

  coverage:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install package and dev/API dependencies
        run: |
          pip install -e ".[dev,api]"
          pip install -r backend/requirements-dev.txt

      - name: Run full test suite with coverage
        run: |
          pytest tests backend/tests \
            --cov=src/data_detective --cov=backend/app \
            --cov-report=term-missing --cov-fail-under=85

      - name: Generate coverage badge
        run: python scripts/gen_coverage_badge.py docs/coverage.svg

      - name: Commit updated badge
        if: github.event_name == 'push'
        run: |
          if ! git diff --quiet -- docs/coverage.svg; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add docs/coverage.svg
            git commit -m "chore: update coverage badge [skip ci]"
            git push
          fi

  fastscan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: "1.22"
          cache: false

      - name: Vet and test fastscan
        working-directory: tools/fastscan
        run: |
          go vet ./...
          gofmt -l . | (! grep .)
          go test ./... -v

      - name: Build fastscan
        working-directory: tools/fastscan
        run: go build -o /tmp/fastscan .

  docker:
    runs-on: ubuntu-latest
    needs: [test, backend-tests, fastscan, typecheck]

    steps:
      - uses: actions/checkout@v7

      - name: Build image
        run: docker build -t data-detective:ci .

      - name: Smoke test container
        run: |
          docker run -d --name dd-smoke -p 8000:8000 data-detective:ci
          for i in $(seq 1 20); do
            if curl -sf http://localhost:8000/api/health; then break; fi
            sleep 1
          done
          curl -sf http://localhost:8000/api/health
          docker logs dd-smoke
          docker stop dd-smoke
