name: Release

# Triggered by pushing a version tag, e.g.:
#   git tag v0.3.0 && git push origin v0.3.0
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

jobs:
  build-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: |
          pip install build
          python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/

  publish-pypi:
    runs-on: ubuntu-latest
    needs: build-python
    # Publishes via PyPI Trusted Publishing (OIDC) - no API token/secret.
    # Gated on the PUBLISH_TO_PYPI repo variable so forks/dry-runs don't
    # attempt to publish. Requires a PyPI trusted publisher configured for
    # this repo + the "pypi" environment, and the repo variable set to
    # 'true' (repo Settings > Secrets and variables > Actions > Variables).
    if: ${{ vars.PUBLISH_TO_PYPI == 'true' }}
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  docker-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}

  github-release:
    runs-on: ubuntu-latest
    needs: [build-python, docker-publish]
    if: always() && needs.build-python.result == 'success' && needs.docker-publish.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/

      - name: Extract this version's CHANGELOG.md section
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="$VERSION" '
            /^## \[/ {
              if (found) exit
              if ($0 ~ "\\[" ver "\\]") { found = 1; next }
              next
            }
            found { print }
          ' CHANGELOG.md > release_notes.md
          # Fall back to a placeholder if the version has no CHANGELOG.md
          # entry yet, rather than shipping an empty release body.
          if [ ! -s release_notes.md ]; then
            echo "No CHANGELOG.md entry found for v$VERSION." > release_notes.md
          fi
          cat release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          files: dist/*
