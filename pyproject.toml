[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "data-detective"
version = "0.2.0"
description = "Smart Data Profiling CLI Tool"
requires-python = ">=3.8"
dependencies = [
	"pandas>=2.0",
	"numpy>=1.24",
]

[project.optional-dependencies]
dev = ["pytest>=7.0"]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
include = ["data_detective*"]

[project.scripts]
data-detective = "data_detective.cli:main"
